[redshift]
temp-day=6500
temp-night=2000
location-provider=manual

; Set the screen brightness. Default is 1.0.
; day/night settings require version >=1.8
brightness-day=1
brightness-night=0.4

; transition on startup/shutdown
; transition=0

[manual]
lat=40.5
lon=-74.4


